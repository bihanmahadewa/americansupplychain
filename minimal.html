<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>American Supply Chain - Made in America</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: monospace;
            max-width: 900px;
            margin: 20px auto;
            padding: 0 20px;
            line-height: 1.6;
        }
        h1 { margin-bottom: 5px; }
        input, select { font-family: monospace; padding: 5px; margin: 5px 5px 5px 0; }
        input[type="text"] { width: 100%; max-width: 400px; }
        .manufacturer { border: 1px solid #000; padding: 15px; margin: 15px 0; }
        .manufacturer h3 { margin-bottom: 10px; }
        .products { margin: 10px 0; }
        a { color: #0000EE; }
        a:visited { color: #551A8B; }
    </style>
</head>
<body>
    <h1>American Supply Chain</h1>
    <p>Directory of American manufacturers</p>
    <hr>

    <h2>Search</h2>
    <input type="text" id="searchInput" placeholder="Search...">
    <select id="stateFilter"><option value="">All States</option></select>
    <select id="industryFilter"><option value="">All Industries</option></select>
    <button id="clearFilters">Clear</button>
    <p id="resultsCount">0 found</p>
    <hr>

    <div id="directoryList"></div>

    <hr>
    <p><a href="mailto:suggest@americansupplychain.com">Suggest a manufacturer</a></p>

    <script src="data.js"></script>
    <script>
        const searchInput = document.getElementById('searchInput');
        const stateFilter = document.getElementById('stateFilter');
        const industryFilter = document.getElementById('industryFilter');
        const clearFiltersBtn = document.getElementById('clearFilters');
        const directoryList = document.getElementById('directoryList');
        const resultsCount = document.getElementById('resultsCount');

        document.addEventListener('DOMContentLoaded', () => {
            populateFilters();
            renderManufacturers(manufacturers);
            attachEventListeners();
        });

        function populateFilters() {
            getUniqueStates().forEach(state => {
                const option = document.createElement('option');
                option.value = state;
                option.textContent = state;
                stateFilter.appendChild(option);
            });

            getUniqueIndustries().forEach(industry => {
                const option = document.createElement('option');
                option.value = industry;
                option.textContent = industry;
                industryFilter.appendChild(option);
            });
        }

        function renderManufacturers(manufacturersToRender) {
            directoryList.innerHTML = '';

            if (manufacturersToRender.length === 0) {
                directoryList.innerHTML = '<p>No manufacturers found.</p>';
                resultsCount.textContent = '0 found';
                return;
            }

            manufacturersToRender.forEach(m => {
                const div = document.createElement('div');
                div.className = 'manufacturer';
                div.innerHTML = `
                    <h3>${m.name}</h3>
                    <p><strong>Industry:</strong> ${m.industry}</p>
                    <p><strong>Location:</strong> ${m.location.city}, ${m.location.state}</p>
                    <p>${m.description}</p>
                    <div class="products">
                        <strong>Products:</strong> ${m.products.join(', ')}
                    </div>
                    <p>
                        ${m.website ? `<a href="${m.website}" target="_blank">Website</a> | ` : ''}
                        ${m.twitter ? `<a href="${m.twitterUrl}" target="_blank">X: ${m.twitter}</a> | ` : ''}
                        ${m.email ? `<a href="mailto:${m.email}">Email</a> | ` : ''}
                        ${m.phone ? `<a href="tel:${m.phone}">${m.phone}</a>` : ''}
                    </p>
                    ${m.founded ? `<p><small>Founded: ${m.founded} | Employees: ${m.employees}</small></p>` : ''}
                `;
                directoryList.appendChild(div);
            });

            resultsCount.textContent = `${manufacturersToRender.length} found`;
        }

        function filterManufacturers() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedState = stateFilter.value;
            const selectedIndustry = industryFilter.value;

            const filtered = manufacturers.filter(m => {
                const matchesSearch = searchTerm === '' ||
                    m.name.toLowerCase().includes(searchTerm) ||
                    m.description.toLowerCase().includes(searchTerm) ||
                    m.products.some(p => p.toLowerCase().includes(searchTerm)) ||
                    m.location.city.toLowerCase().includes(searchTerm) ||
                    m.location.state.toLowerCase().includes(searchTerm);

                const matchesState = selectedState === '' || m.location.state === selectedState;
                const matchesIndustry = selectedIndustry === '' || m.industry === selectedIndustry;

                return matchesSearch && matchesState && matchesIndustry;
            });

            renderManufacturers(filtered);
        }

        function clearFilters() {
            searchInput.value = '';
            stateFilter.value = '';
            industryFilter.value = '';
            filterManufacturers();
        }

        function attachEventListeners() {
            searchInput.addEventListener('input', filterManufacturers);
            stateFilter.addEventListener('change', filterManufacturers);
            industryFilter.addEventListener('change', filterManufacturers);
            clearFiltersBtn.addEventListener('click', clearFilters);
        }
    </script>
</body>
</html>
