<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>American Supply Chain</title>
    <meta name="description" content="Open-source American supply chain directory mapping U.S. manufacturers by category, location, and industrial capability.">
    <meta name="keywords" content="American supply chain, U.S. manufacturing, industrial directory, reshoring, manufacturers map, open source">
    <meta name="author" content="Bihan Mahadewa">
    <meta name="robots" content="index, follow">

    <meta property="og:type" content="website">
    <meta property="og:title" content="American Supply Chain">
    <meta property="og:description" content="Open-source index of U.S. manufacturers, capabilities, and sourcing gaps across the industrial stack.">
    <meta property="og:url" content="https://americansupplychain.vercel.app">
    <meta property="og:site_name" content="American Supply Chain">
    <meta property="og:image" content="https://americansupplychain.vercel.app/flag.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="American Supply Chain">
    <meta name="twitter:description" content="Open-source index of U.S. manufacturers, capabilities, and sourcing gaps across the industrial stack.">
    <meta name="twitter:image" content="https://americansupplychain.vercel.app/flag.png">
    <meta name="twitter:site" content="@bihanmahadewa">
    <link rel="icon" type="image/png" href="flag.png">
    <link rel="stylesheet" href="styles.css">
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    >
</head>
<body>
    <header>
        <div class="container">
            <div class="header-logo">
                <img src="flag.png" alt="American flag" class="flag-icon">
                <h1>American Supply Chain</h1>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="search-section">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search company, product, section, location...">
            </div>

            <div class="filters">
                <select id="stateFilter">
                    <option value="">All States</option>
                </select>

                <select id="industryFilter">
                    <option value="">All Sectors</option>
                </select>

                <button id="clearFilters">Clear</button>
            </div>

            <div class="view-controls">
                <button id="treeViewBtn" class="view-btn active">List</button>
                <button id="graphViewBtn" class="view-btn">Map</button>
            </div>

            <div class="results-info">
                <span id="resultsCount">0 manufacturers indexed</span>
            </div>
        </section>

        <section class="directory-grid" id="directoryGrid">
            <!-- Category directory will be inserted here -->
        </section>

        <section class="graph-container" id="graphContainer" style="display: none;">
            <div id="networkGraph"></div>
        </section>

        <section class="add-manufacturer">
            <p>Know a company that belongs in one of the missing categories? This project is open source.</p>
            <button id="suggestBtn">Contribute</button>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>
                American Supply Chain 2026 by
                <a href="https://x.com/bihanmahadewa" target="_blank" rel="noopener">Bihan Mahadewa</a>
            </p>
        </div>
    </footer>

    <script src="data.js?v=20260417-2"></script>
    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    <script src="app.js?v=20260417-2"></script>
</body>
</html>
